name: Security Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  security-tests:
    name: Run Security Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-cov httpx werkzeug

      - name: Run security tests
        run: |
          pytest tests/unit/test_mercury_trigger.py -v --tb=short

      - name: Run all tests with coverage
        run: |
          pytest tests/ -v --cov=mercury_trigger_plugin --cov=mercury_tools_plugin --cov-report=term-missing --cov-fail-under=0
        continue-on-error: true

  lint:
    name: Code Quality Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ruff

      - name: Run Ruff linter
        run: |
          ruff check mercury_trigger_plugin/ mercury_tools_plugin/ --select=E,F,W --ignore=E501
        continue-on-error: true
